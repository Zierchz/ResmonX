<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResmonX</title>
    <script type="module" src="/src/main.ts" defer></script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>ResmonX</h1>
      <div class="topbar-stats">
        <span id="top-cpu" class="stat">CPU —</span>
        <span id="top-freq" class="stat">— GHz</span>
        <span id="top-mem" class="stat">RAM —</span>
        <span id="top-gpu" class="stat">GPU —</span>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="overview">Resumen</button>
        <button class="tab" data-tab="processes">Procesos</button>
        <button class="tab" data-tab="network">Red</button>
        <button class="tab" data-tab="disk">Disco</button>
        <button class="tab" data-tab="gpu">GPU</button>
      </nav>
    </header>

    <main>
      <section id="view-overview" class="view active">
        <div class="cards" id="overview-cards"></div>
      </section>

      <section id="view-processes" class="view">
        <input id="proc-filter" class="filter" type="text" placeholder="Filtrar procesos…" />
        <div class="table-wrap">
          <table id="proc-table">
            <thead>
              <tr>
                <th data-sort="name">Proceso</th>
                <th data-sort="pid">PID</th>
                <th data-sort="cpu">CPU %</th>
                <th data-sort="memory">RAM</th>
                <th data-sort="read_bps">Lectura/s</th>
                <th data-sort="write_bps">Escritura/s</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="view-network" class="view">
        <div class="cards" id="nic-cards"></div>
        <input id="conn-filter" class="filter" type="text" placeholder="Filtrar conexiones…" />
        <div class="table-wrap">
          <table id="conn-table">
            <thead>
              <tr>
                <th>Proceso</th>
                <th>PID</th>
                <th>Proto</th>
                <th>Local</th>
                <th>Remoto</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="view-disk" class="view">
        <div class="cards" id="disk-cards"></div>
        <div class="table-wrap">
          <table id="disk-table">
            <thead>
              <tr>
                <th>Proceso</th>
                <th>PID</th>
                <th>Lectura/s</th>
                <th>Escritura/s</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="view-gpu" class="view">
        <div class="cards" id="gpu-cards"></div>
        <div class="table-wrap">
          <table id="gpu-table">
            <thead>
              <tr>
                <th>Proceso</th>
                <th>PID</th>
                <th>Tipo</th>
                <th>VRAM</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
